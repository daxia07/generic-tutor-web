name: Refresh Content

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch progress analytics
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_TOKEN: ${{ secrets.TURSO_DB_TOKEN }}
        run: npx tsx scripts/fetch-progress.ts > /tmp/progress.json

      - name: LLM content refresh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/llm-refresh-content.ts /tmp/progress.json

      - name: Check for changes
        id: changes
        run: |
          echo "count=$(git diff --name-only content/ | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit & push to content-refresh branch
        if: steps.changes.outputs.count > 0
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@learn.mingli.world"
          git checkout -b content-refresh
          git add content/
          git commit -m "bot: refresh content based on progress analytics"
          git push origin content-refresh --force
